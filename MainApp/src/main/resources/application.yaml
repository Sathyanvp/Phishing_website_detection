# Spring Boot Configuration for Phishing Detection Service

spring:
  application:
    name: phishing-detection-service
  
  # Server configuration
  server:
    port: 8080
#    servlet:
#      context-path: /
#  
  # Logging configuration
  # This will create a file named 'app.log' in a folder called 'logs' 
  # located in your project's root directory.
  logging:
    file:
      name: logs/app.log
    level:
      root: INFO
      phishing_website: DEBUG
      ai.onnxruntime: WARN
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

